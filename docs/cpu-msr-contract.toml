# cpu-msr-contract.toml — machine-readable mirror of docs/CPU-MSR-CONTRACT.md
# Generated from the §2 (CPUID) / §3 (MSR) tables and the §4 instruction / §5 timer,
# CMOS, and xAPIC-MMIO tables. Normative columns only (Rationale/Citation live in the
# markdown). If this file and the markdown disagree, the markdown wins.
#
# STRICT GRAMMAR (mechanically canonical — §6 expansion rules):
#   * All hex lowercase. No en-dashes, no prose, no comma-in-field, no catch-all rows.
#   * cpuid.entry: one record per leaf (or leaf-lo/leaf-hi for the one extended zero
#     range). leaf/subleaf are 8-hex, or subleaf token '*' (all) / 'Nx+' (N and up) /
#     'a-b' (range). eax/ebx/ecx/edx are 8-hex constants or a dyn token:
#       dyn:osxsave:<base8hex>  dyn:level-echo:<type8hex>  dyn:xcr0-xsavesize
#   * msr.entry: exactly one of index='0xhh' | index-lo/index-hi | index-members=[...].
#     allow-fixed carries read-param padded to 16-hex; emulate-* rows carry a formula-id
#     read-param/write-param (e.g. vclock.tsc, vclock.tsc.write) per §6 — hashed semantics.
#   * EXPANSION: msr ranges/members expand to one record per index; the union of all
#     msr index sets is PAIRWISE DISJOINT (validated). Total MSR indices: 1043.
#   * insn mirrors markdown §4; timer/cmos/mmio mirror §5.

[contract]
version = 4
# vendor axis (the Intel column on the one frozen contract; docs/CPU-MSR-CONTRACT.md
# §1, docs/cpu-msr-contract-amd-draft.toml is the AMD draft column). Header metadata
# only — the zero-drift grammar keeps this file's canonical bytes and contract_hash
# byte-identical: the serializer never emits `vendor`.
vendor = "GenuineIntel"
kernel-tag = "v6.18.35"
kernel-sha256 = "f78602932219125e211c5f5bfd84edcfd4ec5ce88fc944f8248413f665bef236"
cpuid-baseline = "det-cfl-v1"
# §6 anti-drift anchor: sha256 of the canonical serialized form (computed by
# vmm-core's serializer, never hand-written). Re-derive on any body change + version bump.
contract_hash = "30839ae67142f265066be1051e93fcb4a1839c30bd3edd6d875ecdc1a37ddb67"
# Frozen scalar constants hashed into the canonical form (§6 header records):
tsc-hz = 2000000000
crystal-hz = 25000000
bus-hz = 100000000
mxcsr-mask = "0x0000ffff"
rtc-epoch = 1577836800
pit-refresh-ns = 15085

[cpuid]
default = "zeroed"  # in-range gaps explicit all-zero; out-of-range redirects to all-zero max-basic-leaf 0x20
max-basic-leaf = "0x00000020"
max-extended-leaf = "0x80000008"

