[host-assert]
# §1.1/§1.2 host-homogeneity assertions vmm-core checks at VM start (hashed); refuse on mismatch.
family-model-stepping = "06_9e_0c"
# host-microcode-rev: the PHYSICAL host microcode revision, fleet-pinned and deployment-set
# (the det-cfl-v1 box: i9-9900K, kernel-recorded microcode 0xf8). DISTINCT from the guest-visible
# BIOS_SIGN_ID (guest-ucode-rev, MSR 0x8b = 0x0000000100000000). Changing the pinned host rev = version bump.
host-microcode-rev = "0x00000000000000f8"
guest-ucode-rev = "0x0000000100000000"
mxcsr-mask = "0x0000ffff"
maxphyaddr-min = 39
# rtm-disabled: on det-cfl-v1, RTM/HLE are PHYSICALLY ABSENT (CPUID.7.0:EBX[4,11]=0, IA32_TSX_CTRL
# #GPs), so XBEGIN/XEND/XTEST/XABORT #UD natively — no host pin is installed or needed. The probe's
# `rtm-disabled` check is satisfied by physical absence (XBEGIN #UDs); the key name is retained.
rtm-disabled = true
# cr4-force-reserved: bits vmm-core keeps reserved in the guest CR4 so the listed
# features are unreachable (PKE: RDPKRU/WRPKRU #UD; PKS: IA32_PKRS unreachable). §4 RDPKRU row.
cr4-force-reserved = ["PKE", "PKS"]
host-absent = ["HRESET", "PCONFIG", "RDPID", "SERIALIZE", "SHA", "TPAUSE", "UMONITOR", "UMWAIT"]

