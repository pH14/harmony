[ports]
# Host-captured I/O ports — transport/observability lanes that are NOT trapped CPU
# state. Like the §1 hypercall doorbell, these carry **no per-host or hidden-µarch
# input**, so they are NOT §6-hashed rows: the canonical serializer (vmm-core's
# parse/canonical) never reads this section, so adding it leaves contract_hash
# unchanged. Documentary only; the normative source is docs/INTEGRATION.md.

[[ports.entry]]
# Conformance report channel (corpus box-integration, task 28). A 32-bit
# `OUT 0x0CA2, EAX` appends EAX to the VM's ordered report stream, which vmm-core
# digests (with the serial banner) into the O2 `observable_digest`. Distinct from
# the 0x0CA1 hypercall doorbell (§1): a reported value can never be mistaken for a
# doorbell ring. The reported values are already deterministic (a V-time TSC, a
# seeded-PRNG word, a frozen CPUID/MSR value, a retired count), so the stream is a
# pure function of the run. See docs/INTEGRATION.md "report channel".
name = "REPORT_PORT"
port = "0x0ca2"
width = "dword"
direction = "out"
capture = "host"
hashed = false
