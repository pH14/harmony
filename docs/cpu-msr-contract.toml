# VMCALL row = the VMCALL *instruction*'s disposition under the determinism backend
# (patched/direct-VMX): it VM-exits unconditionally and is dispatched to the hypercall handler.
# NOT stock-serviceable: stock KVM services VMCALL in-kernel (-ENOSYS for our magic) and never
# exits to userspace. On stock KVM the hypercall channel is the port-I/O DOORBELL (KVM_EXIT_IO),
# reworked in task 20. The doorbell's port (0x0CA1) and request/response page GPAs live in
# INTEGRATION.md §1 ONLY — they are deliberately NOT contract rows and never enter the §6
# canonical form / contract_hash (they carry no per-host or hidden-µarch input). See
# CPU-MSR-CONTRACT.md §4 VMCALL row. (Fields below unchanged by task 20 → contract_hash unchanged.)
[[insn.entry]]
