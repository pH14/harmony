# PostgreSQL for the bare-Postgres workload image (task 37). We vendor the Debian
# trixie .debs (server + client + libpq) by URL+sha256 — same pin-then-verify
# discipline as the kernel/busybox. PostgreSQL 17.10 is the trixie security build;
# pinned 2026-06-26. The runtime shared-lib closure (glibc, libicu, libssl, ...)
# is taken from the build host's own /lib at build time (the determinism box is
# the pinned build environment) — see harmony-linux/linux/build-postgres-image.sh. URLs
# are the debian-security pool; if a version is superseded, re-fetch the same
# files (sha256-addressable) from snapshot.debian.org.
PG_MAJOR=17
PG_VERSION=17.10-0+deb13u1
PG_DEB_BASE=https://deb.debian.org/debian-security/pool/updates/main/p/postgresql-17
PG_SERVER_DEB_URL=$PG_DEB_BASE/postgresql-17_17.10-0+deb13u1_amd64.deb
PG_SERVER_DEB_SHA256=3b7d9dbfd2f618d767fc091ffb7432faa6284a20f7095b430dd57644602f40dd
PG_CLIENT_DEB_URL=$PG_DEB_BASE/postgresql-client-17_17.10-0+deb13u1_amd64.deb
PG_CLIENT_DEB_SHA256=0f4b84e21eb9df17a000af9a5c68eeed14c7c1cad9fa911bb3cb26311ee4a5b5
PG_LIBPQ_DEB_URL=$PG_DEB_BASE/libpq5_17.10-0+deb13u1_amd64.deb
PG_LIBPQ_DEB_SHA256=bcaba7700a2afbdc4b7bf0b0bc9532f1cd49a8fd6fa47ccab125befd4ba7716a

# --- task 38: Postgres-in-Docker (the container stack + the official image) ---
# Docker's official **static** binary bundle (dockerd + containerd +
# containerd-shim-runc-v2 + runc + the docker CLI + ctr) — all statically
# linked, so the guest rootfs needs no glibc closure for the container stack
# (only the busybox + the static docker bins). Pinned by URL+sha256 like the
# kernel/busybox; pinned 2026-06-26 (latest stable on download.docker.com).
DOCKER_VERSION=29.6.0
DOCKER_TGZ_URL=https://download.docker.com/linux/static/stable/x86_64/docker-29.6.0.tgz
DOCKER_TGZ_SHA256=4d2f6782406b56eb43a519ad5078a6a79abe4d663328acb69136aceff5e05224

# The **official `postgres` image** baked into the rootfs (no runtime registry
# pull — the spec's requirement). We pin it by registry **digest** (content-
# addressed, the strongest integrity anchor); `harmony-linux/scripts/fetch.sh` pulls it
# with the box's `ctr` (containerd) into an isolated namespace and `ctr image
# export`s a `docker load`-compatible tar to harmony-linux/dl/postgres-image.tar. The
# digest below is the multi-arch index for `postgres:17`; ctr resolves the
# linux/amd64 manifest (recorded too, for provenance). Pinned 2026-06-26.
POSTGRES_IMAGE_NAME=postgres:17
POSTGRES_IMAGE_INDEX_DIGEST=sha256:5f050f770b427fbd477edee6c3968a72e5c6be97e050a7e368b2b74a9494a285
POSTGRES_IMAGE_AMD64_DIGEST=sha256:9c1534cbf839ec70409508a874f4c02bf4739de2f32f77efe080eef1cfd34bf4

# --- task 49: Postgres on lightweight Kubernetes (k3s), client pod -> server pod ---
# k3s is the lightweight single-binary distro the task recommends: ONE statically
# linked Go binary that bundles containerd + runc + the CNI plugins (flannel,
# bridge, host-local, loopback, portmap) + kube-proxy + kubectl + crictl + ctr,
# with a **sqlite** datastore (kine) instead of etcd. It self-extracts its bundled
# data dir on first run, so the guest rootfs needs only the one binary + the
# pre-imported container images. Pinned by URL+sha256 (the release's own
# sha256sum-amd64.txt) like the kernel/busybox/docker bundle; pinned 2026-06-29
# (k3s "latest" stable release, tracking Kubernetes v1.36). The `+k3s1` build-
# metadata in the tag is literal in the GitHub release path (curl handles it).
K3S_VERSION=v1.36.2+k3s1
K3S_BIN_URL=https://github.com/k3s-io/k3s/releases/download/v1.36.2+k3s1/k3s
K3S_BIN_SHA256=65a55ec56c24eab44383086166ec620a491952b7e23941a49ddca6e8a4c4b4de
# The k3s **air-gap images** tarball: the OCI images k3s would otherwise pull at
# runtime (pause/sandbox, coredns, traefik, metrics-server, local-path, klipper).
# We import ONLY the pause/sandbox image from it (every pod needs the sandbox
# container; we --disable the rest), extracted in fetch.sh on the box with `ctr`
# into harmony-linux/dl/k3s-pause-image.tar — keeping the guest light (boot V-time is the
# bottleneck). Integrity is the digest-pinned tarball below.
K3S_AIRGAP_URL=https://github.com/k3s-io/k3s/releases/download/v1.36.2+k3s1/k3s-airgap-images-amd64.tar
K3S_AIRGAP_SHA256=6f8acd19735479234692f17b51889f60aa32059ce818f1fa5621a9b6511d2cb6

# --- task 86: the libretro NES core for the SMB game workload ---
# FCEUmm (libretro/libretro-fceumm), fetched at image-build time from a
# commit-pinned upstream tarball — never vendored (the kernel discipline; the
# bedrock no-copy rule applies). LICENSE (audited per-file at this pin,
# round-3 P1): **GPL-2.0-or-later** — 490 of 601 src files carry explicit
# headers, every one "version 2 ... or (at your option) any later version"
# (488 GPL-2.0-or-later + 2 LGPL-2.1-or-later, Blargg's nes_ntsc); zero
# only-versioned files; the unheadered remainder falls under the repo Copying
# serving those grants. AGPL-3-compatible via the or-later upgrade to GPL-3
# (AGPL-3 §13). Chosen over QuickNES (whose pin mixed an LGPL core with an
# unheadered libretro glue under a bare GPL-2 LICENSE — a GPL-2.0-only
# reading, AGPL-3-incompatible) and over Mesen (GPL-3, clean, but the
# heaviest core — throughput matters at box branch rates); see
# harmony-linux/play-agent/IMPLEMENTATION.md. Determinism comes from the VM, not the
# core. The SAME pin provisions task 87's host-side film renderer, which is
# what makes savestate replay 1:1. Pinned 2026-07-09 (master head). Verify:
# shasum -a 256 <tarball>.
FCEUMM_COMMIT=0d610d9a6401697157f693a5407adf450a0e52fb
FCEUMM_URL=https://github.com/libretro/libretro-fceumm/archive/0d610d9a6401697157f693a5407adf450a0e52fb.tar.gz
FCEUMM_SHA256=fa4bd76278221ea5416da3085559ea4473c37f305bc96f804c79a3937207f0a1
FCEUMM_LICENSE=GPL-2.0-or-later

