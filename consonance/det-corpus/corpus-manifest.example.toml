# Example corpus manifest — the schema `load_manifest` / `to_manifest` speak.
#
# The canonical registry lands at docs/corpus-manifest.toml once real payloads
# and goldens exist (task 18); it is out of this task's edit scope, so this file
# documents the format. Each [[item]] declares which oracles apply to a workload;
# a diff to such a file is how "we added/changed a determinism test" is reviewed.
#
# Tokens:
#   kind     = "micro" | "workload" | "fuzz_seed"
#   oracles  = any of:
#                "determinism"            (O1)
#                "conformance"            (O2 — requires `golden`)
#                "seed_sensitivity:rng"   (O3, RNG-consuming payload)
#                "seed_sensitivity:pure"  (O3, seed-pure payload)
#   golden   = path to the committed digest; required iff "conformance" is listed.

[[item]]
name = "rdtsc-monotonic"
kind = "micro"
source = "guest/payloads/rdtsc.bin"
oracles = ["determinism", "conformance"]
golden = "guest/golden/rdtsc.digest"

[[item]]
name = "rdrand-stream"
kind = "micro"
source = "guest/payloads/rdrand.bin"
oracles = ["determinism", "conformance", "seed_sensitivity:rng"]
golden = "guest/golden/rdrand.digest"

[[item]]
name = "cpuid-sweep"
kind = "micro"
source = "guest/payloads/cpuid.bin"
oracles = ["determinism", "seed_sensitivity:pure"]

[[item]]
name = "compute"
kind = "workload"
source = "guest/payloads/compute.bin"
oracles = ["determinism"]
