# The host-side half of the ARM spike apparatus: the minimal KVM harness and the
# evidence floor checkers. Standalone workspace (the repo root globs only
# consonance/* and dissonance/*), cross-built for the Altra box.
#
# `payloads/` is its own workspace (aarch64-unknown-none, no_std) and `oracle-model`
# carries its own empty [workspace] table so both can path-depend on it.
[workspace]
resolver = "2"
members = ["harness", "schemas/floor-check"]
exclude = ["payloads", "oracle-model"]

[workspace.package]
edition = "2024"
license = "AGPL-3.0-or-later"

[workspace.dependencies]
oracle-model = { path = "oracle-model", version = "0.1.0", features = ["std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
sha2 = "0.10"
libc = "0.2"
vtime = { path = "../../consonance/vtime", version = "0.1.0" }

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }

[profile.release]
debug = true
