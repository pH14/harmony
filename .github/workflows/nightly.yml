name: nightly

# Nightly safety-net jobs that are too slow / resource-heavy to gate every PR on the
# shared `ci.slice`. Runs when the box is not contended by PR CI. Also manually
# dispatchable. Moving Miri here (2026-06-24): it was OOM/timeout-flaky under PR
# concurrency and blocked merges on resource limits, not bugs — it stays a UB safety
# net, just off the per-PR critical path. See the note in quality.yml.
on:
  schedule:
    # 08:00 UTC daily — outside typical PR-CI hours so Miri gets the box's full memory.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  miri:
    name: miri (unsafe crates, UB safety net)
    runs-on: self-hosted
    # Generous ceiling: Miri interprets everything, and vmm-core has grown — the
    # per-PR job was getting SIGKILLed (137) mid-run. Nightly has no PR contention.
    timeout-minutes: 90
    env:
      PINNED_NIGHTLY: nightly-2026-06-16
      MIRIFLAGS: -Zmiri-permissive-provenance
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned nightly + miri
        run: |
          rustup toolchain install "${PINNED_NIGHTLY}" --profile minimal --component miri
      # Run each unsafe crate as its own step so a single crate's failure is legible
      # and one crate's Miri memory footprint is reclaimed before the next.
      - name: miri — vmcall-transport
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vmcall-transport
      - name: miri — vm-state
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vm-state
      - name: miri — vmm-core
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vmm-core
      - name: miri — vmm-backend
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vmm-backend --all-features
      # conductor's unsafe is the mock composition's `map_memory` forward
      # (task 78's CountingBackend); the lib tests compose the VM so it is
      # reachable under the interpreter. `--lib` only: the integration suites
      # drive socket servers with full VMs per proptest case — interpreted,
      # they blow the job ceiling without touching any additional unsafe.
      - name: miri — conductor (lib)
        run: cargo "+${PINNED_NIGHTLY}" miri test -p conductor --lib
      # film (task 87): geometry/callback rejection paths + revalidation run
      # interpreted; the libretro FFI itself is cfg'd off under Miri. The
      # feature flag pulls in the CoreReplay seam's testable half. Recorded
      # merge-time addition per the PR #87 round-4 checklist.
      - name: miri — film (core-replay feature)
        run: cargo "+${PINNED_NIGHTLY}" miri test -p film --features core-replay
      # snapshot-store (task 95 M1 merge-time item, PR #91): --lib only — the
      # mapping/materialize tests need real file-backed mmap, which Miri cannot
      # execute (they are cfg(not(miri))). The lib tests need disable-isolation
      # for tempfile creation on top of the job-level permissive-provenance.
      - name: miri — snapshot-store (lib)
        run: cargo "+${PINNED_NIGHTLY}" miri test -p snapshot-store --lib
        env:
          MIRIFLAGS: -Zmiri-permissive-provenance -Zmiri-disable-isolation
      # guest/flow-agent (task 61) is out-of-workspace (its own manifest). Its ONLY
      # unsafe is the binary's `cfg(target_os="linux")` FFI — `clock_gettime`, and
      # (under `cfg(all(linux, x86_64))`) `mmap /dev/mem` + `iopl` +
      # `VmcallTransport::with_doorbell`'s `OUT` asm. Miri CANNOT execute real
      # syscalls / asm, and this FFI is `cfg`-gated off the aarch64-darwin Miri host
      # anyway (the non-target stubs compile there) — the same exclusion this
      # workflow applies to the vmcall-transport asm doorbell and the KVM/perf FFI.
      # So there is no `unsafe` in the compiled Miri target: this run is a UB safety
      # net over the crate's ONLY non-FFI logic — the unsafe-free brain (lib.rs:
      # answer→policy, enforcement plan, decider) + the real hypercall-proto
      # decode/dispatch driven through the loopback in tests/decider.rs. The FFI's
      # own soundness is documented at its `// SAFETY:` blocks + the doorbell module
      # doc; the pointer/bounds logic it relies on lives in (Miri-covered)
      # vmcall-transport. `--lib --test decider`.
      - name: miri — guest/flow-agent (lib + decider, out-of-workspace manifest)
        run: cargo "+${PINNED_NIGHTLY}" miri test --manifest-path guest/flow-agent/Cargo.toml --lib --test decider
      # guest/play-agent (task 86) is out-of-workspace, the flow-agent shape: its
      # ONLY unsafe is the binary's cfg(linux) libretro dlopen FFI + the hugetlb/
      # pagemap/mlock billboard pinning + the /dev/mem doorbell — all real
      # syscalls Miri cannot execute, cfg-gated off the Miri host. This run is
      # the UB safety net over the unsafe-free brain (lib.rs: chord decode, RAM
      # map, billboard writer, the mock-core agent loop) + the agent integration
      # suite. Proptest cases are cut under cfg(miri).
      - name: miri — guest/play-agent (lib + agent, out-of-workspace manifest)
        run: cargo "+${PINNED_NIGHTLY}" miri test --manifest-path guest/play-agent/Cargo.toml --lib --test agent
