name: nightly

# Nightly safety-net jobs that are too slow / resource-heavy to gate every PR on the
# shared `ci.slice`. Runs when the box is not contended by PR CI. Also manually
# dispatchable. Moving Miri here (2026-06-24): it was OOM/timeout-flaky under PR
# concurrency and blocked merges on resource limits, not bugs — it stays a UB safety
# net, just off the per-PR critical path. See the note in quality.yml.
on:
  schedule:
    # 08:00 UTC daily — outside typical PR-CI hours so Miri gets the box's full memory.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  # vmm-core is the long pole (Miri interprets serially, so its wall time is the
  # SUM of its per-test costs — a full run is tens of minutes even after the
  # task-98/hm-d8o tail shrink), so it gets its OWN job and its own measured
  # budget instead of sharing the other crates' ceiling. With a second runner
  # slot the two jobs run in parallel; on a single-slot runner they serialize —
  # either way each command must fit ITS OWN checked-in timeout.
  #
  # vmm-core's UB surface is the two `Backend::map_memory` pointer seams in
  # `bringup`, and BOTH are exercised by a running Miri test:
  #   - boot path: `compose`/`compose_linux` over owned `GuestRam` —
  #     `bringup::tests::compose_drives_guestram_and_unsafe_map_memory` (and every
  #     mock boot).
  #   - restore path (task 95 M2.2): `compose_restore_target` maps a
  #     `snapshot_store::Mapping` moved into the returned `Vmm` — a different
  #     ownership/lifetime obligation, covered by
  #     `bringup::tests::compose_restore_target_map_memory_over_an_anonymous_mapping`,
  #     which drives the same seam over the 4-KiB-aligned `Mapping::anonymous`
  #     buffer through a pointer-retaining backend double (the retained raw
  #     pointer is read AFTER the move, so Miri checks the liveness obligation).
  # Task 98: the `ControlServer` restore-driving tests (`Branch`/`Replay`/
  # `engine.materialize()`) are `#[cfg_attr(miri, ignore)]`d — they hit
  # `snapshot-store`'s tempfile+mmap, which Miri can't execute; their rationale
  # strings cite the dedicated restore-target test above. Job-level
  # `-Zmiri-permissive-provenance` only — no disable-isolation.
  # See consonance/vmm-core/IMPLEMENTATION.md (task 98).
  # Budget (task 98, measured): the exact command below runs in ~34 min real on
  # an M-class Mac after the hm-d8o tail shrink (pre-shrink: ~92 min, the round-2
  # bug). First box run (2026-07-13, dispatch on the task branch): 49 min 38 s
  # while CO-RUNNING with the sibling miri job on the second runner slot (and
  # 47:46 on the repeat, run 29236400380). A third, midday dispatch (29251169490)
  # hit a 3-way-contended box (quality storms; every step ran ~2x its quiet-hour
  # cost) and timed out at 90 — so the ceiling is 120: ~2.5x the measured
  # quiet-hour wall, absorbing a 2x-contention morning without going red. NOTE
  # when re-measuring: under Miri WITHOUT -Zmiri-disable-isolation, libtest's
  # "finished in" prints the interpreter's deterministic VIRTUAL clock (~2x real
  # on the Mac) — time the command externally.
  miri-vmm-core:
    name: miri — vmm-core (UB safety net, own job)
    runs-on: self-hosted
    timeout-minutes: 120
    env:
      PINNED_NIGHTLY: nightly-2026-06-16
      MIRIFLAGS: -Zmiri-permissive-provenance
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned nightly + miri
        run: |
          rustup toolchain install "${PINNED_NIGHTLY}" --profile minimal --component miri
      - name: miri — vmm-core
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vmm-core

  miri:
    name: miri (unsafe crates, UB safety net)
    runs-on: self-hosted
    # Budget (task 98, measured on the box, run 29236400380): vmcall 13.2 +
    # vm-state 2.4 + vmm-backend 15.9 + film 16.0 + snapshot-store 0.8 +
    # flow-agent 0.1 = ~48 min co-tenant with the vmm-core job, plus the
    # play-agent step (task 86, landed on main under this measurement — the
    # flow-agent shape, minutes not tens).
    # RE-DERIVED (task 104, hm-d4y): the campaign-runner step is no longer a ~1.3 s
    # slice — it is the full lib suite, measured at 11 min 46 s real on the Mac
    # ⇒ ~13 min on the box (the ~1.12x Mac→box factor from PR #99's
    # vmcall-transport comparison). New quiet-hour sum ≈ 48 + 13 ≈ 61 min, and
    # 155 = ~2.5x that, on the same derivation as before: it absorbs the ~2x
    # step slowdown a contended box showed on the midday dispatch 29251169490
    # (see the vmm-core job comment) without going red. Do NOT cut this back to
    # 120 without re-measuring — 120 was 2.5x the OLD 48-minute sum, and the
    # campaign-runner step did not exist in it.
    timeout-minutes: 155
    env:
      PINNED_NIGHTLY: nightly-2026-06-16
      MIRIFLAGS: -Zmiri-permissive-provenance
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned nightly + miri
        run: |
          rustup toolchain install "${PINNED_NIGHTLY}" --profile minimal --component miri
      # Run each unsafe crate as its own step so a single crate's failure is legible
      # and one crate's Miri memory footprint is reclaimed before the next.
      - name: miri — vmcall-transport
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vmcall-transport
      - name: miri — vm-state
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vm-state
      - name: miri — vmm-backend
        run: cargo "+${PINNED_NIGHTLY}" miri test -p vmm-backend --all-features
      # film (task 87): geometry/callback rejection paths + revalidation run
      # interpreted; the libretro FFI itself is cfg'd off under Miri. The
      # feature flag pulls in the CoreReplay seam's testable half. Recorded
      # merge-time addition per the PR #87 round-4 checklist.
      - name: miri — film (core-replay feature)
        run: cargo "+${PINNED_NIGHTLY}" miri test -p film --features core-replay
      # snapshot-store (task 95 M1 merge-time item, PR #91): --lib only — the
      # mapping/materialize tests need real file-backed mmap, which Miri cannot
      # execute (they are cfg(not(miri))). The lib tests need disable-isolation
      # for tempfile creation on top of the job-level permissive-provenance.
      - name: miri — snapshot-store (lib)
        run: cargo "+${PINNED_NIGHTLY}" miri test -p snapshot-store --lib
        env:
          MIRIFLAGS: -Zmiri-permissive-provenance -Zmiri-disable-isolation
      # guest/flow-agent (task 61) is out-of-workspace (its own manifest). Its ONLY
      # unsafe is the binary's `cfg(target_os="linux")` FFI — `clock_gettime`, and
      # (under `cfg(all(linux, x86_64))`) `mmap /dev/mem` + `iopl` +
      # `VmcallTransport::with_doorbell`'s `OUT` asm. Miri CANNOT execute real
      # syscalls / asm, and this FFI is `cfg`-gated off the aarch64-darwin Miri host
      # anyway (the non-target stubs compile there) — the same exclusion this
      # workflow applies to the vmcall-transport asm doorbell and the KVM/perf FFI.
      # So there is no `unsafe` in the compiled Miri target: this run is a UB safety
      # net over the crate's ONLY non-FFI logic — the unsafe-free brain (lib.rs:
      # answer→policy, enforcement plan, decider) + the real hypercall-proto
      # decode/dispatch driven through the loopback in tests/decider.rs. The FFI's
      # own soundness is documented at its `// SAFETY:` blocks + the doorbell module
      # doc; the pointer/bounds logic it relies on lives in (Miri-covered)
      # vmcall-transport. `--lib --test decider`.
      - name: miri — guest/flow-agent (lib + decider, out-of-workspace manifest)
        run: cargo "+${PINNED_NIGHTLY}" miri test --manifest-path guest/flow-agent/Cargo.toml --lib --test decider
      # guest/play-agent (task 86) is out-of-workspace, the flow-agent shape: its
      # ONLY unsafe is the binary's cfg(linux) libretro dlopen FFI + the hugetlb/
      # pagemap/mlock billboard pinning + the /dev/mem doorbell — real syscalls
      # Miri cannot execute, cfg-gated off non-Linux hosts. This run is the UB
      # safety net over the unsafe-free brain (lib.rs: chord decode, RAM map,
      # billboard writer, the mock-core agent loop) PLUS the hoisted FFI-edge
      # logic (lib.rs glue: callback responses, joypad-bit mapping, work-RAM
      # copy bounds, hugetlb length bound, pagemap decode) + the agent
      # integration suite. `--bins` (round-9 P1) additionally builds the binary
      # itself on this job's Linux host — where the cfg(linux) modules COMPILE
      # under Miri — and executes the bin's own unit tests, which drive the one
      # residual value-carrying unsafe (env_cb's bool store) through a real
      # pointer with no FFI. Proptest cases are cut under cfg(miri).
      - name: miri — guest/play-agent (lib + agent + bin unit tests, out-of-workspace manifest)
        run: cargo "+${PINNED_NIGHTLY}" miri test --manifest-path guest/play-agent/Cargo.toml --lib --test agent --bins
      # campaign-runner — the FULL lib suite, restored (task 104, hm-d4y). It replaces
      # the UNSAFE-ONLY slice PR #99 left here as an interim: the slice watched
      # the crate's one `unsafe` block (the task-78 CountingBackend `map_memory`
      # forward, src/mock.rs) at ~1.3 s, but the rest of the suite had NEVER
      # completed in CI (2026-07-13: run 29226001494 killed at 57+ min; run
      # 29236400380 still interpreting after 3 h 11 min — 1 h 50 min real even on
      # an idle Mac, unbounded under box contention).
      #
      # Why it fits now. A per-test profile showed the tail is NOT the sha256/RAM
      # shape vmm-core had (campaign-runner's lib composes exactly one 16-KiB mock VM):
      # it is the CAMPAIGN SEARCH LOOPS — the toy-machine benchmark/game campaigns
      # run 2048- and 64-branch budgets, and the interpreter charges ~0.4–4 s of
      # real time per branch. So the hm-d8o treatment lands on the budgets, all
      # `cfg(miri)`-keyed inside the test modules (native runs are byte-for-byte
      # unchanged, 146 tests, and no public API moved):
      #   - the game campaigns drop 64 → 8 branches (their claims — a rerun is
      #     bit-identical, seeds diverge, the selector diverges, cells/depth flow —
      #     are budget-independent and verified to hold at 8);
      #   - the planted-bug campaigns narrow their (gpa × mask × Moment) search
      #     space 256 → 16 schedules that still bracket the trigger, so the same
      #     campaign finds the bug at branch 9 instead of 868, all gates passing;
      #   - the benchmark campaigns keep budgets sized against the find index each
      #     one actually needs (bug 3 first fires at branch 19/33, bug 1 at
      #     202/255).
      # ONE test is `#[cfg_attr(miri, ignore)]`d — `dual_config_runs_and_is_
      # deterministic_twice`, four full 2048-branch campaigns (~27 min interpreted,
      # 80% of the pre-shrink run) whose find assertion is budget-coupled in BOTH
      # configurations, so it cannot be cut without turning vacuous. Its rationale
      # string names the cheaper Miri-run siblings that keep its family covered.
      # (The other 2 ignored are the pre-existing tempdir/TraceStore tests Miri's
      # filesystem isolation forbids.)
      #
      # Budget (task 104, measured): the exact command below runs in 11 min 46 s
      # REAL wall on an uncontended M-class Mac — 84 passed, 0 failed, 3 ignored —
      # against ~2 h 24 min for the same suite pre-shrink. NOTE when re-measuring:
      # libtest printed "finished in 1312.67s" for that 706-second run — under Miri
      # WITHOUT -Zmiri-disable-isolation that line is the interpreter's VIRTUAL
      # clock (~1.9x real here), so time the command externally, as the vmm-core
      # job's comment also records. The box is ~1.12x the Mac (PR #99's
      # vmcall-transport comparison), i.e. ~13 min quiet-hour, which is what this
      # job's ceiling below is re-derived from. campaign-runner stays the LAST step (PR
      # #99): it is still this job's longest pole, and a blowout here must not skip
      # the small crates above it.
      #
      # The guard is the slice's filter-rot guard, generalized to the whole suite.
      # A green suite must not be reachable by quietly un-running what the gate
      # exists for, and there are exactly two ways to do that: rename/ignore the
      # one test that drives the `unsafe` forward, or re-gate the tail this task
      # just un-gated. Both would be silently vacuous passes; both fail the step.
      - name: miri — campaign-runner (lib)
        run: |
          out=$(cargo "+${PINNED_NIGHTLY}" miri test -p campaign-runner --lib 2>&1); rc=$?
          echo "$out"
          [ $rc -eq 0 ] || exit $rc
          echo "$out" | grep -q "test mock::tests::mock_vmm_composes_maps_memory_and_ticks_per_exit \.\.\. ok" || {
            echo "UNSAFE UNWATCHED: the map_memory-forward test did not run under Miri — renamed, or newly cfg_attr(miri, ignore)d. The crate's only unsafe block is now unwatched; fix the test, do not delete this guard."
            exit 1
          }
          res=$(echo "$out" | grep -o "^test result: ok\. [0-9][0-9]* passed; [0-9][0-9]* failed; [0-9][0-9]* ignored")
          ign=$(echo "$res" | sed -n 's/.*failed; \([0-9][0-9]*\) ignored.*/\1/p')
          [ "${ign:-999}" -le 3 ] || {
            echo "MIRI TAIL RE-GATED: $ign tests are ignored under Miri, expected at most 3 (task 104: dual_config_runs_and_is_deterministic_twice + the 2 filesystem tests). Raising this bound means a new rationale string per test AND a re-measured budget above — not a bigger number here."
            exit 1
          }
          # …and a PASSED FLOOR, because the ignored bound alone does not close the
          # hole (PR #105 round 1): a test moved behind `#[cfg(not(miri))]` — or
          # simply deleted — is never COMPILED into the Miri binary, so it does not
          # count as ignored. It vanishes from the summary entirely, the ignored
          # bound still reads 3, and the step stays green while the campaign tail
          # this task restored silently stops running. Only a floor on what actually
          # RAN can see that.
          #
          # 84 is today's count (87 lib tests − the 3 ignored). This floor RATCHETS
          # UP: when tests are added to the crate, raise it to the new passing count
          # in the same PR. It is never LOWERED without a rationale string on the
          # test that left and a re-measured budget above — "the number went down"
          # is the failure this guard exists to report, not a reason to edit it.
          pass=$(echo "$res" | sed -n 's/^test result: ok\. \([0-9][0-9]*\) passed.*/\1/p')
          [ "${pass:-0}" -ge 84 ] || {
            echo "MIRI SUITE SHRANK: only $pass tests ran under Miri, floor is 84. A test was deleted or moved behind #[cfg(not(miri))] — which, unlike #[cfg_attr(miri, ignore)], never reaches the summary at all. Restore it, or justify its removal and ratchet the floor in the same PR."
            exit 1
          }
