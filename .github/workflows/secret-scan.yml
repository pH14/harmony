# SPDX-License-Identifier: AGPL-3.0-or-later
name: secret-scan

# Every pushed branch is public, so scan all pushes rather than main alone. Pull
# requests cover contributions from forks. The scheduled/manual forms scan the
# complete checked-out history because TruffleHog receives no event commit range.
on:
  push: {}
  pull_request: {}
  schedule:
    - cron: "17 8 * * 0"
  workflow_dispatch: {}

# The scanner only needs to read the checkout. In particular, it receives no
# repository, package, or identity token with write privileges.
permissions:
  contents: read

# Cancellation must never discard an unscanned range (review F1): a canceled
# push run's before..after range is never re-covered, because the replacement
# run derives its own, narrower range. Only pull_request runs may cancel their
# predecessors — the action recomputes the full base..head range there, so the
# replacement is cumulative. Every other event gets a per-run group: never
# canceled, never canceling — in particular a push to main cannot cancel the
# weekly full-history scan, nor vice versa.
concurrency:
  group: secret-scan-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout complete history
        # v7.0.0, pinned to an immutable commit.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for verified or unverifiable credentials
        # v3.95.9, pinned to an immutable commit. The version input pins the
        # multi-platform scanner image by digest as well, rather than trusting
        # either the moving `latest` image or a mutable release tag.
        #
        # Skipped only when a push event carries an empty commit range (tag
        # pushes, rewind-only force pushes): the action's push path would exit
        # green having scanned nothing ("No commits to scan") — the step below
        # covers that case instead (review F2). --fail-on-scan-errors: a scan
        # that errored scanned nothing and must not report green (review F4).
        if: github.event_name != 'push' || toJson(github.event.commits) != '[]'
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55
        with:
          version: 3.95.9@sha256:59b244249d1a1aef4baa24fe73d3c931616264482580d806d77f6c74d26b3e42
          extra_args: --results=verified,unknown --fail-on-scan-errors

      - name: Full-history scan (push with no commit range — tags, rewinds)
        # A tag push publishes otherwise-unreachable objects while its event
        # payload's `commits` array is empty, so the range-based scan above has
        # nothing to scan (review F2). Scan the complete checked-out history
        # instead — same pinned image digest, same result classes; --fail exits
        # nonzero on findings and --fail-on-scan-errors on scan errors (F4).
        if: github.event_name == 'push' && toJson(github.event.commits) == '[]'
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/trufflesecurity/trufflehog:3.95.9@sha256:59b244249d1a1aef4baa24fe73d3c931616264482580d806d77f6c74d26b3e42 \
            git file:///repo --results=verified,unknown --fail --fail-on-scan-errors
