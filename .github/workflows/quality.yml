name: quality

# Enforcement runs on GITHUB-HOSTED runners (ubuntu-latest). harmony is a public
# repo, so standard Linux runners are free with unlimited minutes — the reason these
# jobs used to run on the self-hosted determinism box (private-repo minutes were
# exhausted, "not to be paid for") is gone. Every job here is a CONTENT check: fmt,
# clippy -D warnings, cargo-deny, nextest, coverage, mutation, Kani, public-api, and
# the arm-altra pre-build apparatus incl. its Miri gate. None of them need bare metal
# — a cache-thrashed slower run produces the same artifact and the same hash, so the
# runner's microarchitecture and contention do not affect the verdict
# (docs/BOX-PINNING.md, "CI runner isolation": "Correctness gates are contention-
# immune").
#
# What STAYS on the box (NOT in this workflow, and never was): the ~23
# live_*/determinism/seal-rate/PMU gates that need a real /dev/kvm, the patched KVM
# module, hardware perf counters, and quiet pinned cores. Those run out-of-band
# through scripts/box-window.sh (docs/BOX-PINNING.md, "Frontier determinism gates").
# Formalizing them as a dispatchable `runs-on: [self-hosted, kvm]` job is a documented
# follow-up (see the migration PR description); until then the box's role is unchanged.
#
# Cargo tools (cargo-nextest, cargo-deny, cargo-llvm-cov, cargo-mutants) are installed
# per-job with taiki-e/install-action (prebuilt binaries, seconds). The shared-temp
# race that once flaked install-action — and forced pre-provisioning on the box — was
# a property of CONCURRENT jobs sharing one self-hosted /tmp; on GHA every job gets a
# fresh, isolated runner, so it cannot recur. Swatinem/rust-cache caches the cargo
# registry + target dir across runs so only changed crates recompile.
#
# macOS portability (conventions rule 6) is held by developers running the gates
# locally on macOS and by the fast .githooks/pre-push hook. A `macos-latest` leg could
# be added to `gates` cheaply now that hosted minutes are free — left out for now.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gating: fmt, clippy (enforces clippy.toml), cargo-deny, and the test suite.
  gates:
    name: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install CI cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny@0.19.9
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: cargo deny
        run: cargo deny check
      # The root `cargo deny check` only sees the root workspace. License-check the
      # out-of-workspace manifests too (guest/payloads + the cargo-fuzz harnesses), so
      # their deps — e.g. libfuzzer-sys's NCSA-licensed LLVM runtime — are asserted
      # AGPL-compatible against the same allow-list (task 91).
      - name: cargo deny (guest + fuzz manifests)
        run: |
          cargo deny --manifest-path guest/payloads/Cargo.toml check --config deny.toml licenses
          cargo deny --manifest-path dissonance/control-proto/fuzz/Cargo.toml check --config deny.toml licenses
          cargo deny --manifest-path dissonance/flow/fuzz/Cargo.toml check --config deny.toml licenses
      - name: cargo nextest
        run: cargo nextest run --all-features
      # The ARCH-BOUNDARY seam gate (tasks/108). The whole point of the `Arch` trait
      # + engine/vendor split is that a NON-x86 vendor can be added additively — but
      # nothing else in CI would ever notice if that stopped being true, because this
      # box is x86-64 and every other gate compiles only for it. Cross-CHECK (not
      # run) the workspace for aarch64-linux: it type-checks the arch-neutral engine
      # against a target where the x86 KVM substrate is cfg'd OUT, so an x86 leak into
      # the engine — or a `cfg(target_os = "linux")` that should have been
      # `cfg(all(target_os = "linux", target_arch = "x86_64"))` — fails HERE instead
      # of on the day someone starts the ARM backend. (`kvm_bindings` exposes a
      # different `kvm_regs` per arch, so an ungated x86 substrate does not even
      # parse on aarch64 — that is exactly what this catches.)
      #
      # CARGO_FEATURE_NO_NEON: blake3's build script compiles a NEON `.c` for aarch64
      # and needs an aarch64 C toolchain we do not ship. This is a CHECK — no aarch64
      # artifact is ever linked or run — so steering blake3 to its NEON-free path is
      # sound and keeps the gate free of a cross-compiler dependency.
      - name: cross-check aarch64 (the arch seam must stay additive)
        run: |
          rustup target add aarch64-unknown-linux-gnu
          CARGO_FEATURE_NO_NEON=1 cargo clippy --target aarch64-unknown-linux-gnu \
            --all-features --all-targets -- -D warnings
      # guest/sdk is an out-of-workspace `no_std` crate (its own Cargo.toml), so the
      # root fmt/clippy/nextest above never see it. Gate it explicitly on its own
      # manifest — its host-side loopback tests (duplicate-coordinate rejection,
      # emission dispositions, determinism) must stay green like any other crate.
      - name: guest/sdk gates (out-of-workspace manifest)
        run: |
          cargo fmt --manifest-path guest/sdk/Cargo.toml --all -- --check
          cargo clippy --manifest-path guest/sdk/Cargo.toml --all-features --all-targets -- -D warnings
          cargo test --manifest-path guest/sdk/Cargo.toml --all-features
          # License-check its deps against the same allow-list (like the guest/fuzz
          # manifests above) — the root `cargo deny` never sees this manifest.
          cargo deny --manifest-path guest/sdk/Cargo.toml check --config deny.toml licenses
          # no_std build proof: the crate and its deps must compile for the bare
          # metal target the guest actually runs in (host-only tests can't catch a
          # std leak). Fails the gate if anything pulls in std.
          rustup target add x86_64-unknown-none
          cargo build --manifest-path guest/sdk/Cargo.toml --lib --target x86_64-unknown-none
      # Actually LINK the SDK-instrumented demo guest for bare metal — from its own
      # dir, so guest/payloads/.cargo/config.toml (target + linker) applies. The
      # guest/sdk `--lib` proof above compiles the library, but only a full payload
      # link exercises the SDK end-to-end against the boot shim; a regression that
      # breaks the demo (the box gate's guest) would otherwise surface only on the box.
      - name: guest/payloads sdk-demo build (bare metal, from its dir)
        working-directory: guest/payloads
        run: cargo build -p sdk-demo
      # guest/flow-agent (task 61) is out-of-workspace (its own manifest), like
      # guest/sdk, so the root fmt/clippy/nextest/deny above never see it. Gate it
      # explicitly on its own manifest — the flow-agent brain (answer→policy,
      # enforcement plan, decider) + its cfg(linux) doorbell must stay green like any
      # other crate, or the crate rots green (the gap that just red-mained us).
      - name: guest/flow-agent gates (out-of-workspace manifest)
        run: |
          cargo fmt --manifest-path guest/flow-agent/Cargo.toml --all -- --check
          cargo clippy --manifest-path guest/flow-agent/Cargo.toml --all-features --all-targets -- -D warnings
          cargo test --manifest-path guest/flow-agent/Cargo.toml --all-features
          cargo deny --manifest-path guest/flow-agent/Cargo.toml check --config deny.toml licenses
          # Build the static musl target it actually ships as (a std-leak or a
          # cfg(linux) doorbell regression only surfaces on a real Linux target —
          # ubuntu-latest runs Linux, so the cfg(target_os="linux") FFI is compiled
          # here, which the macOS dev host and codex both skip).
          rustup target add x86_64-unknown-linux-musl
          cargo build --manifest-path guest/flow-agent/Cargo.toml --bin flow-agent --target x86_64-unknown-linux-musl
      # guest/play-agent (task 86) is out-of-workspace (its own manifest), like
      # flow-agent — gate it explicitly or it rots green. The portable brain
      # (chord decode, RAM map, billboard, mock-core agent loop) tests everywhere;
      # the native bin build compiles the cfg(linux) libretro-FFI + hugetlb +
      # doorbell glue, which the macOS dev host skips. Dynamic glibc build (it
      # dlopens the pinned core at runtime), so the native build IS the ship
      # target here — no musl step.
      - name: guest/play-agent gates (out-of-workspace manifest)
        run: |
          cargo fmt --manifest-path guest/play-agent/Cargo.toml --all -- --check
          cargo clippy --manifest-path guest/play-agent/Cargo.toml --all-features --all-targets -- -D warnings
          cargo test --manifest-path guest/play-agent/Cargo.toml --all-features
          cargo deny --manifest-path guest/play-agent/Cargo.toml check --config deny.toml licenses
          cargo build --manifest-path guest/play-agent/Cargo.toml --bin play-agent
      # spikes/differential-lineage (tasks/120, hm-bbx.2) is out-of-workspace (its
      # own manifest, spike convention), so the root gates above never see it —
      # gate it explicitly or its test suite rots green while it feeds the hm-bbx.5
      # ratification decision. --locked: the committed Cargo.lock is part of the
      # spike's reproducibility claim (differential-dataflow/timely pins).
      # (Benchmarks are NOT run here — REPORT.md documents the local command.)
      - name: spikes/differential-lineage gates (out-of-workspace manifest)
        run: |
          cargo fmt --manifest-path spikes/differential-lineage/Cargo.toml --all -- --check
          cargo clippy --locked --manifest-path spikes/differential-lineage/Cargo.toml --all-features --all-targets -- -D warnings
          cargo test --locked --manifest-path spikes/differential-lineage/Cargo.toml --all-features
          # Release build: the benchmark (REPORT.md) is release-only, and cargo
          # test above builds only the dev profile — a release-only codegen or
          # link regression would otherwise escape CI (J6).
          cargo build --locked --release --manifest-path spikes/differential-lineage/Cargo.toml --all-targets
          cargo deny --manifest-path spikes/differential-lineage/Cargo.toml check --config deny.toml licenses

  # spikes/arm-altra (task 109) — the ARM pre-build apparatus: three out-of-workspace
  # workspaces (harness+floor-check, oracle-model, payloads) that the root gates above
  # cannot see. It is gated here, and not left to a local-only script, for one reason:
  # the floor-checkers are ARRIVAL-DAY LOAD-BEARING evidence-integrity code. They are
  # what a stage disposition will rest on when the Altra lands, and between merge and
  # arrival there is nothing else to stop them rotting green.
  #
  # Miri runs in THIS job rather than the nightly one: arm-harness carries `unsafe`
  # (the perf/KVM syscall seam), the suite is seconds not minutes, and the repo bar is
  # that unsafe crates run clean under the pinned interpreter. The interpreter reaches
  # the memory-safety-critical logic through a seam: the payload-image copy that used
  # to live in the (Linux-only, un-interpretable) KVM harness is factored into
  # `elf::Elf::load_into`, safe code over a `&mut [u8]` that Miri drives against an
  # in-process buffer — including the malformed `p_filesz > p_memsz` case. The mmap +
  # ioctl paths remain `cfg(target_os="linux")` and are the documented asm/privileged
  # exception (Miri cannot issue a syscall).
  #
  # The bare-metal payload crates are deliberately NOT Miri-gated, and the reason is
  # intrinsic to each — documented per-crate, not waved away:
  #   - `runtime` (payloads/runtime/src/lib.rs, its own crate doc): `#![no_std]`, targets
  #     aarch64-unknown-none; every unsafe op is inline `asm!`/`global_asm!` (boot.s,
  #     vectors.s, the HLT exit, MRS reads) or `read/write_volatile` to FIXED PHYSICAL
  #     addresses (the GICv3 dist at 0x0800_0000, the PL011 at UART_BASE, the shared
  #     GPAs). Miri executes no machine code and has no such memory — those pointers are
  #     invalid under it. There is no non-privileged logic left to interpret once the
  #     privileged parts are seamed, so the cfg(miri)-seam escape hatch does not apply.
  #   - `oracles`: thin payload `main`s that call straight into `runtime`; same limit.
  # Their behaviour is exercised by the TCG smoke (real instructions on an emulated N1,
  # the only thing that CAN run physical MMIO + asm). The portable pointer/allocation
  # logic that Miri CAN check — the ELF loader, the kvm_run decode, the state digest —
  # was factored into `arm-harness` precisely so it is gated under Miri above.
  #
  # NOT gated here: the qemu-system-aarch64 TCG payload smoke (payloads/smoke.sh). It
  # needs qemu on the runner, which we do not install in CI, and which the payloads'
  # asm/MMIO can only be exercised on. It stays the documented LOCAL gate — run it
  # before pushing anything under payloads/ (spikes/arm-altra/README.md says so, and
  # says what it does and does not prove). The window-verification gate below is the
  # part of that smoke which needs no emulator, and it is the part that checks the
  # oracle's central claim: that each payload's branches are the ones the model says.
  spike-arm-altra:
    name: spikes/arm-altra (ARM pre-build apparatus)
    runs-on: ubuntu-latest
    env:
      PINNED_NIGHTLY: nightly-2026-06-16
      MIRIFLAGS: -Zmiri-permissive-provenance
      SPIKE: spikes/arm-altra
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchains + cross targets
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
          # The bare-metal payload target, and the Altra's Linux target: `cargo check`
          # for aarch64-linux is what proves the KVM/perf syscall seam COMPILES for the
          # box (it cannot be run here, and it has never run anywhere — the hardware is
          # not yet in hand).
          rustup target add aarch64-unknown-none aarch64-unknown-linux-gnu
          rustup toolchain install "${PINNED_NIGHTLY}" --profile minimal --component miri
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: spikes/arm-altra
      - name: Install CI cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.9
      - name: harness + floor-check (fmt, clippy, tests, deny)
        run: |
          cargo fmt --manifest-path "$SPIKE/Cargo.toml" --all -- --check
          cargo clippy --manifest-path "$SPIKE/Cargo.toml" --all-features --all-targets -- -D warnings
          cargo test --manifest-path "$SPIKE/Cargo.toml" --all-features
          cargo deny --manifest-path "$SPIKE/Cargo.toml" check --config deny.toml
      - name: oracle-model (own workspace; no_std + std)
        run: |
          cargo fmt --manifest-path "$SPIKE/oracle-model/Cargo.toml" --all -- --check
          cargo clippy --manifest-path "$SPIKE/oracle-model/Cargo.toml" --features std --all-targets -- -D warnings
          cargo test --manifest-path "$SPIKE/oracle-model/Cargo.toml" --features std
          # The model is shared with the no_std payloads: it must still build for the
          # bare-metal target with default features.
          cargo build --manifest-path "$SPIKE/oracle-model/Cargo.toml" --target aarch64-unknown-none
          cargo deny --manifest-path "$SPIKE/oracle-model/Cargo.toml" check --config deny.toml
      - name: harness cross-clippy for the box (aarch64-linux syscall seam)
        # clippy, not check: the aarch64 syscall seam is `cfg(target_os = "linux")`, so
        # the native (x86 host) clippy job never compiles it — target-specific lints
        # (e.g. the useless_conversion class that only aarch64 clippy exposes, r5) would
        # otherwise merge undetected. `-D warnings` makes them fail the job.
        run: cargo clippy --manifest-path "$SPIKE/Cargo.toml" -p arm-harness --all-targets --target aarch64-unknown-linux-gnu -- -D warnings
      - name: payloads (bare-metal build + the window-vs-oracle gate)
        # cd, not --manifest-path: the payload workspace's .cargo/config.toml pins the
        # aarch64-unknown-none target and the static relocation model, and cargo only
        # reads that config from the working directory upward.
        run: |
          cd "$SPIKE/payloads"
          cargo fmt --all -- --check
          # No `--all-targets`: aarch64-unknown-none has no `test` crate, so building
          # the (nonexistent) test targets of a `no_std` bare-metal workspace fails
          # E0463. The payloads' behaviour is gated by the TCG smoke locally and by
          # the window-vs-oracle scan below; clippy here covers the lib and the bins.
          cargo clippy --bins -- -D warnings
          cargo build --release
          cargo deny check --config ../../../deny.toml
          cd ../harness
          # The claim "the taken-branch count is known by construction", machine-checked:
          # every payload's window is disassembled out of the built ELF and its branch
          # sequence must equal the oracle model's. RC propagates.
          cargo run --quiet --bin arm-scan -- windows ../payloads/target/aarch64-unknown-none/release
      - name: kernel patch — format + parse gate
        # The FULL patch gate (`host/verify.sh`: apply onto pristine 6.18.35 + compile
        # against the KVM tree) needs a native-aarch64 builder with the pinned kernel
        # tree (`host/BUILD.md`) — it cannot run on an x86 runner, and is run there.
        # What CI CAN and now DOES cover is the most likely regression: a later edit that
        # corrupts, truncates, or malforms the patch so it stops applying. Each patch is
        # validated as a well-formed git mail-format patch whose diff parses — a mangled
        # patch fails here instead of merging green. RC propagates (`set -e`).
        run: |
          set -e
          cd "$SPIKE/host"
          # Job-unique scratch files: $RUNNER_TEMP is per-job; mktemp under it is unique.
          msg="$(mktemp "${RUNNER_TEMP:-/tmp}/patch-msg.XXXXXX")"
          patch="$(mktemp "${RUNNER_TEMP:-/tmp}/patch-diff.XXXXXX")"
          trap 'rm -f "$msg" "$patch"' EXIT
          test -d patches && ls patches/*.patch >/dev/null
          for p in patches/*.patch; do
            test -s "$p"                                   # present and non-empty
            git mailinfo "$msg" "$patch" < "$p" >/dev/null # valid mail-format patch
            git apply --stat "$patch" >/dev/null           # the diff parses (hunks well-formed)
          done
          echo "patch format + parse OK; the apply-onto-6.18.35 + compile gate runs on the aarch64 builder (host/BUILD.md §0)"
      - name: determinism comparator negative controls
        run: python3 -m unittest discover -s "$SPIKE/host/tests" -p 'test_*.py'
      # arm-harness is the crate with `unsafe` (the perf/KVM syscall seam), so the
      # repo's unsafe⇒Miri bar applies to it. The Machine's raw-pointer ops that a real
      # KVM mapping otherwise hides from the interpreter — the volatile kvm_run
      # read-modify-write (`complete_mmio_read`) and guest-RAM `from_raw_parts`
      # (`state_digest`) — are extracted into the portable `sys::write_mmio_read` /
      # `sys::guest_ram` seams and exercised HERE under Miri against allocation-backed
      # buffers (`sys::tests::write_mmio_read_stages_over_an_allocation`,
      # `guest_ram_borrows_the_allocation`). floor-check is deliberately NOT here:
      # it contains no `unsafe`, its fixture tests are filesystem reads Miri's
      # isolation forbids, and interpreting it would buy minutes of CI for no UB
      # coverage. (`cargo miri test -p floor-check` still works locally — its
      # fixture target is `#![cfg(not(miri))]`.)
      - name: miri — arm-harness (the unsafe perf/KVM seam)
        run: cargo "+${PINNED_NIGHTLY}" miri test --manifest-path "$SPIKE/Cargo.toml" -p arm-harness
      # The payload crates (runtime, oracles) contain `unsafe` but are architecturally
      # outside the unsafe⇒Miri path, by the contract's own terms — see the rebuttal in
      # payloads/runtime/src/lib.rs (§`unsafe`, and why this crate is Miri-exempt), which
      # quotes AGENTS.md:48-55 and tasks/00-CONVENTIONS.md:104-117. Two facts: (1) their
      # top-level `global_asm!` is aarch64 machine code the host assembler rejects, so
      # `cargo miri test -p runtime`/`-p oracles` does not compile — no interpreter run
      # to gate; (2) the residual unsafe is the rule's own `asm!` carve-out plus
      # fixed-GPA volatile MMIO (integer-literal addresses with no provenance, nothing to
      # loopback). The rule's actual target — "the pointer/bounds logic" — is, for these
      # payloads, the clock-page byte layout, seamed into oracle-model as pure `[u8]`
      # packing and interpreted under Miri right here. (oracle-model is
      # `forbid(unsafe_code)`; this run validates that shared layout, the PRNG, and the
      # count derivations.)
      - name: miri — oracle-model (shared page layout + count derivations)
        run: cargo "+${PINNED_NIGHTLY}" miri test --manifest-path "$SPIKE/oracle-model/Cargo.toml" --features std

  # Miri (UB validation for the `unsafe` crates) was MOVED to the nightly workflow
  # (.github/workflows/nightly.yml). Rationale (2026-06-24): on the shared `ci.slice`
  # under PR concurrency the Miri run was OOM/timeout-flaky (SIGKILL/137) and
  # *blocked merges on resource limits, not bugs* — and across this project's history
  # it has not caught a UB bug (most `unsafe` here is `cfg(linux)` KVM/perf syscalls +
  # the doorbell `asm!`, which Miri cannot run; the real bugs came from the cross-model
  # review pass, mutants, the contract audit, and the box determinism gates). Miri stays
  # a UB *safety net*, just nightly + manually-dispatchable, not a per-PR gate.
  # The unsafe⇒Miri review-bar rule (AGENTS.md / pr-review) still applies: when a PR's
  # diff adds/changes `unsafe`, run Miri locally on that crate
  # (`cargo +nightly-2026-06-16 miri test -p <crate>`) and quote it in the review.
  # (The OOM/timeout flakiness was a shared-box-contention artifact; a dedicated 16 GB
  # GHA runner may make Miri MORE reliable — hm-w9s tracks re-measuring it.)

  # Gating: region-coverage floor measured from reality (docs/CODE-QUALITY.md,
  # "Coverage baseline"). Ratchet FLOOR up as coverage improves; never pick a
  # round number. Hardened by quality-b.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install CI cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      # `--ignore-filename-regex` drops the box-only `cfg(linux)` substrate paths
      # from the coverage denominator: the stock-KVM path
      # (`consonance/vmm-backend/src/kvm.rs`, `…/src/kvm/`, `…/src/kvm_sys.rs`), the
      # task-21 determinism backend (`…/src/patched_kvm.rs`), the task-47 run_until
      # PMU syscall orchestration (`…/src/pmu_sys.rs` — its PURE config `pmu.rs`
      # stays covered), vmm-core's `perf_event` work counter
      # (`consonance/vmm-core/src/work_perf.rs`), and campaign-runner's box composition
      # root (`dissonance/campaign-runner/src/boxrun.rs`, issue #69 — every function in
      # it needs a real `/dev/kvm` + patched KVM + a built guest image; split out
      # of `main.rs` so the portable CLI dispatch logic around it stays
      # coverage-*counted* — see `dissonance/campaign-runner/IMPLEMENTATION.md`). This
      # coverage job runs **without `--ignored`** (and on every crate's matrix), so
      # the box-only `#[ignore]` integration tests that exercise the FFI / perf
      # orchestration end-to-end never run here — counting those paths would only
      # drag the floor, and running live KVM/perf in this job is impossible on a
      # hosted runner (no /dev/kvm, no patched module). They are verified instead by
      # those `#[ignore]` box tests and by Miri (which still *executes* `kvm.rs`'s
      # synthetic-`kvm_run` unit tests — incl. the KVM_EXIT_DETERMINISM decode — so a
      # logic regression still fails the suite, just not coverage-*counted*). The
      # coverage-gated set is the portable, platform-agnostic logic the splits
      # factored out: `region`/`run_buf`, the value types, the run-loop contract
      # (`mock`/`run_loop`), and vmm-core's `work::WorkSource`/`ScriptedWork` + V-time
      # completion. See the crates' IMPLEMENTATION.md.
      - name: cargo llvm-cov (region floor 90%)
        run: |
          cargo llvm-cov nextest --all-features --lcov --output-path lcov.info \
            --ignore-filename-regex 'consonance/vmm-backend/src/(kvm(\.rs|_sys\.rs|/)|patched_kvm\.rs|pmu_sys\.rs)|consonance/vmm-core/src/vendor/x86/work_perf\.rs|dissonance/campaign-runner/src/boxrun\.rs' \
            --fail-under-regions 90
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov
          path: lcov.info

  # Gating (quality-c): mutation testing on the PR diff. `--in-diff` mutates
  # only lines the PR changed, so a PR that adds under-tested logic fails here
  # even though full-tree mutation is too slow for per-PR CI. Config (test tool,
  # timeouts, main.rs exclusion) lives in mutants.toml. Skipped on pushes to
  # main, where there is no diff to compare against.
  mutants:
    name: mutants
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # `--in-diff` needs the merge-base, so fetch full history.
          fetch-depth: 0
      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install CI cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Compute PR diff
        run: git diff "origin/${{ github.base_ref }}"...HEAD > pr.diff
      - name: cargo mutants --in-diff
        run: cargo mutants --no-shuffle --in-diff pr.diff
      # guest/sdk is out-of-workspace (its own manifest), so the root run above
      # never mutates it even when the PR diff touches its files — leaving the SDK
      # harness (assert/buggify/state hooks + wire encode) ungated. Mutate its
      # diffed lines on their own manifest, mirroring the fmt/clippy/test/public-api
      # split the `gates` job already applies to guest/sdk. `--in-diff` filters to
      # the PR's changed guest/sdk lines; its own `.cargo/mutants.toml` (if any)
      # auto-discovers, else the run is config-free.
      - name: cargo mutants --in-diff (guest/sdk, out-of-workspace manifest)
        run: cargo mutants --manifest-path guest/sdk/Cargo.toml --no-shuffle --in-diff pr.diff
      # guest/flow-agent (task 61) is out-of-workspace too — mutate its diffed lines
      # on its own manifest so the flow-agent brain (answer→policy / enforcement plan
      # / decider) is gated like guest/sdk, not left ungated by the root run.
      - name: cargo mutants --in-diff (guest/flow-agent, out-of-workspace manifest)
        run: cargo mutants --manifest-path guest/flow-agent/Cargo.toml --no-shuffle --in-diff pr.diff

  # Gating (quality-f): formal proofs on saturating/bounded integer arithmetic
  # via Kani (bounded model checking). The `#[cfg(kani)]` harnesses in
  # `consonance/vtime/src/clock.rs`, `consonance/lapic/src/device.rs`,
  # `consonance/vmm-backend/src/region_proofs.rs`, and
  # `dissonance/environment/src/envcodec.rs` prove "never panics / law holds for
  # ALL inputs" — strictly stronger than the proptest sampling. Kani is
  # Linux-only, so this job runs on a Linux runner. The proof files are
  # `cfg(kani)`-only (not compiled by the normal test suite, excluded from the
  # mutation gate in `.cargo/mutants.toml`), so this job is their *only* CI check
  # — every crate with proofs must appear below. See each crate's
  # IMPLEMENTATION.md ("Formal proofs (Kani)").
  kani:
    name: kani
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      # Kani downloads CBMC + its solver backends on `cargo kani setup` (minutes).
      # Cache the verifier binary + the setup dir so nightly reruns skip the download;
      # bump the key's version suffix when kani-verifier is upgraded.
      - name: Cache Kani toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: kani-${{ runner.os }}-v1
      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup
      - name: cargo kani (vtime + lapic + vmm-backend + environment)
        run: |
          cargo kani -p vtime
          cargo kani -p lapic
          cargo kani -p vmm-backend
          cargo kani -p environment

  # Gating: frozen public-API snapshots (quality-d). The per-crate
  # `public_api` tests regenerate each crate's public surface with
  # `cargo public-api` on the pinned nightly and diff it against the committed
  # `tests/public-api.txt`; any drift in a frozen contract
  # (tasks/00-CONVENTIONS.md rule 3) fails here. Keep PINNED_NIGHTLY in sync
  # with the tests, the miri job, and docs/CODE-QUALITY.md.
  public-api:
    name: public-api
    runs-on: ubuntu-latest
    env:
      # cargo-public-api needs rustdoc-JSON, which is nightly-only. Pin it so
      # the snapshot output is reproducible across runs and machines.
      PINNED_NIGHTLY: nightly-2026-06-16
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchains (stable default + pinned nightly)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup toolchain install "${PINNED_NIGHTLY}" --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: public-api snapshot tests
        run: |
          cargo test \
            -p hypercall-proto -p snapshot-store -p unison -p vtime -p vm-state -p vmm-backend -p vmm-core -p lapic -p gicv3 -p environment -p control-proto -p explorer -p sdk-events -p flow -p matcher -p runtrace -p campaign-runner -p tactics-regime -p logtmpl -p resolution -p det-corpus \
            --test public_api -- --ignored --nocapture
          # guest/sdk is out-of-workspace (its own manifest), so it is not in the
          # `-p` list above — freeze its public surface on its own manifest.
          cargo test --manifest-path guest/sdk/Cargo.toml \
            --test public_api -- --ignored --nocapture
