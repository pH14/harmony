# cargo-fuzz harness for pv-net (task 26, acceptance gate 1). Kept inside the
# crate directory (conventions rule 1 — touch only `dissonance/pv-net/`) rather
# than the repo-root `fuzz/` that task 19 owns. The empty `[workspace]` table
# makes this its own workspace root, so the parent workspace's `dissonance/*`
# glob never pulls it in and the standard `-p pv-net` gates ignore it.
#
# Dependency note (ask-by-comment, per conventions rule 5): `libfuzzer-sys` is
# the standard cargo-fuzz harness crate and is outside the dependency whitelist;
# it is used only by this fuzz-only, nightly-only build, never by the library.
# `arbitrary` is whitelisted as a dev/fuzz dependency.
[package]
name = "pv-net-fuzz"
version = "0.0.0"
publish = false
edition = "2024"
license = "AGPL-3.0-or-later"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.pv-net]
path = ".."

[[bin]]
name = "parse_on_tx"
path = "fuzz_targets/parse_on_tx.rs"
test = false
doc = false
bench = false

[workspace]
