# The harmony in-guest play-agent (task 86): the real-game workload — a minimal
# headless libretro frontend running Super Mario Bros. as an ordinary supervised
# Linux guest process. Per frame (its own `retro_run` counter is the frame clock)
# it draws chord inputs from the seeded entropy stream (`Sdk::entropy_fill`),
# emits SMB state registers (`state_set`/`state_max` — the host owns cell
# interpretation, R-L2), publishes the always-on billboard (task 87's enabling
# seam), and marks legibility events (`assert_reachable`).
#
# Standalone workspace (like `guest/flow-agent` and `guest/sdk`): the root
# Cargo.toml excludes `guest/`, so this crate declares its own `[workspace]` and
# carries its own lockfile. It is a **guest-resident harmony-linux artifact** —
# the no-`cfg(target_os)` portability rule does not apply to it (conventions
# "Environment"); the pure *brain* (chord decode, RAM-map decode, billboard
# layout, the frame loop over the mock-core seam) is nonetheless target-agnostic
# so it builds and is unit-tested on the macOS dev host, and only the libretro
# C-ABI FFI + the billboard pinning (hugetlb/pagemap/mlock) are Linux.
[package]
name = "harmony-play-agent"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-or-later"
description = "The harmony in-guest play-agent (task 86): SMB under a headless libretro core — chord inputs from seeded entropy, SMB state registers, the always-on billboard"

# Own workspace root so cargo does not fold this into the excluded guest/ tree or
# the repo root workspace.
[workspace]

[lib]
name = "harmony_play_agent"
path = "src/lib.rs"

[[bin]]
name = "play-agent"
path = "src/main.rs"

# Explicit `version` alongside `path` for `cargo deny`'s wildcard ban, mirroring
# the other guest crates.
[dependencies]
# The guest SDK: `state_set`/`state_max`/`assert_reachable`/`entropy_fill` over
# the hypercall Event service (read-only surface — composed, never modified).
harmony-sdk = { path = "../sdk", version = "0.1.0" }
# The guest-side hypercall client + Transport trait the SDK is generic over.
hypercall-proto = { path = "../../consonance/hypercall-proto", version = "0.1.0", default-features = false, features = ["guest"] }
# The real doorbell transport (mapped out of /dev/mem, flow-agent pattern).
vmcall-transport = { path = "../../consonance/vmcall-transport", version = "0.1.0" }
clap = { version = "4", features = ["derive"] }

# Guest-resident Linux glue: the libretro dlopen FFI, the /dev/mem doorbell
# mapping, and the billboard's hugetlb + pagemap + mlock pinning. Only referenced
# under `cfg(target_os = "linux")` (guest harmony-linux code — the
# no-cfg(target_os) rule is waived per the task's Environment note); on the macOS
# dev host the bin builds without it.
[target.'cfg(target_os = "linux")'.dependencies]
libc = { version = "0.2" }

[dev-dependencies]
proptest = "1"
